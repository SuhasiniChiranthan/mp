---
- name: Deploy Maven Artifact (Jenkins User Accessible)
  hosts: local
  become: no

  tasks:
    - name: Ensure deployment directory exists
      ansible.builtin.file:
        path: /var/lib/jenkins/deployment
        state: directory
        mode: '0755'

    - name: Copy the artifact to the deployment directory
      ansible.builtin.copy:
        src: /var/lib/jenkins/workspace/HelloMaven-CI/target/mproj-1.0-SNAPSHOT.jar
        dest: /home/output/mproj.jar
        remote_src: yes
